<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Semântica</title>
</head>
<body>

    <p>Nesta frase, temos um <i>termo em itálico</i> usando a tag I (não semântica)</p>
    <!--tags para deixar em italico-->

    <p>Nesta frase, temos um <em>termo em ênfase usando</em> a tag EM (SEMÂNTICA)</p>

</body>
